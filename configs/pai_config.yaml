# 阿里云 PAI 训练配置
# 针对 PAI-DSW 和 PAI-DLC 优化

# 模型配置
model:
  name: "textcnn"
  vocab_size: 50000
  embed_dim: 300
  num_classes: 10
  filter_sizes: [2, 3, 4, 5]
  num_filters: 128
  dropout: 0.5

# 训练配置 - 针对 PAI GPU 优化
training:
  epochs: 50
  batch_size: 256        # PAI GPU 显存较大，可增大 batch
  learning_rate: 0.001
  weight_decay: 1.0e-5
  max_len: 512
  early_stopping:
    patience: 10
    min_delta: 0.001
  scheduler:
    type: "cosine"
    T_max: 50
  gradient_clip: 1.0
  
# 数据配置 - PAI 存储路径
data:
  train_path: "/mnt/data/cnfanews_training.json"  # 数据盘路径
  val_split: 0.15
  test_split: 0.05
  min_content_length: 50
  max_content_length: 2000
  
# 数据增强
augmentation:
  enabled: true
  synonym_replace_prob: 0.1
  random_delete_prob: 0.05
  random_swap_prob: 0.05
  
# GPU 配置 - PAI 多 GPU 支持
gpu:
  device: "cuda"
  mixed_precision: true
  num_workers: 8         # PAI 多核 CPU
  pin_memory: true
  distributed: false     # 是否使用分布式训练
  
# 日志和检查点 - PAI 输出目录
logging:
  log_dir: "/mnt/output/logs"
  checkpoint_dir: "/mnt/output/checkpoints"
  save_every: 5
  log_every: 100
  
# PAI 实验跟踪 - 与 PAI-Studio 集成
experiment:
  name: "textcnn_cnfanews_pai"
  tags: ["textcnn", "cnfanews", "pai", "gpu"]
  
# PAI 特定配置
pai:
  platform: "dsw"        # dsw 或 dlc
  instance_type: "ecs.gn6i-c4g1.xlarge"  # GPU 实例类型
  use_oss: false         # 是否使用 OSS 存储数据
  oss_bucket: ""         # OSS Bucket 名称
